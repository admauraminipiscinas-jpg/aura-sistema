<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --verde:#3f6f5e; --verde2:#345c4e; --azul:#2c7be5; --azul-d:#1a68d1;
    --bg:#eef2fb; --card:#ffffff; --txt:#1f2937; --muted:#6b7280;
    --linea:#e5e7eb; --ok:#16a34a; --rojo:#dc2626; --amar:#f5b400;
    --sombra:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
  /* Topbar */
  .topbar{position:sticky;top:0;z-index:40;height:56px;background:linear-gradient(#fbfbfb,#eceef2);border-bottom:1px solid var(--linea);display:flex;align-items:center;gap:12px;padding:0 14px}
  .burger{font-size:22px;background:none;border:none;cursor:pointer;color:#444;padding:6px 8px;border-radius:8px}
  .burger:hover{background:#0001}
  .brand{font-weight:800;letter-spacing:.5px;color:var(--verde);font-size:18px}
  .brand small{font-weight:600;color:var(--muted);font-size:10px;display:block;letter-spacing:2px;margin-top:-2px}
  .brand-img{height:30px;display:block}
  .spacer{flex:1}
  .pill{background:#fff;border:1px solid var(--linea);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--muted)}
  /* Layout */
  .wrap{display:flex;min-height:calc(100vh - 56px)}
  .side{width:230px;background:#fff;border-right:1px solid var(--linea);padding:10px 0;flex-shrink:0}
  .side a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#374151;text-decoration:none;font-weight:600;cursor:pointer;border-left:3px solid transparent}
  .side a .ic{width:20px;text-align:center;opacity:.7}
  .side a:hover{background:#f3f6f5}
  .side a.active{background:#eaf3ef;border-left-color:var(--verde);color:var(--verde2)}
  .main{flex:1;padding:22px;max-width:1200px}
  h1.page{font-size:30px;font-weight:800;border-bottom:2px solid #cbd5e1;padding-bottom:12px;margin-bottom:20px}
  /* Cards */
  .card{background:var(--card);border-radius:14px;box-shadow:var(--sombra);padding:18px;margin-bottom:18px}
  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:18px}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:end}
  .field{display:flex;flex-direction:column;gap:5px;min-width:150px;flex:1}
  .field label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  input,select,textarea{padding:10px 12px;border:1px solid var(--linea);border-radius:9px;font-size:15px;background:#fff;width:100%;font-family:inherit}
  textarea{min-height:74px;resize:vertical;line-height:1.45}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px #2c7be520}
  input.err,select.err{border-color:var(--rojo);box-shadow:0 0 0 3px #dc262620}
  .btn{border:none;border-radius:10px;padding:11px 18px;font-size:15px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .btn-green{background:var(--verde);color:#fff}.btn-green:hover{background:var(--verde2)}
  .btn-greenlight{background:#5a917d;color:#fff}.btn-greenlight:hover{background:#4e8270}
  .btn-blue{background:var(--azul);color:#fff}.btn-blue:hover{background:var(--azul-d)}
  .btn-amber{background:var(--amar);color:#3a2d00}
  .btn-ghost{background:#fff;border:1px solid var(--linea);color:#374151}
  .btn-sm{padding:7px 11px;font-size:13px;border-radius:8px}
  .chip{background:#fff;border:1px solid var(--linea);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;color:#374151;cursor:pointer}
  .chip:hover{background:#eaf3ef;border-color:#cfe6dc;color:var(--verde2)}
  .cont{display:inline-block;margin-top:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .cont-rest{background:#e0edff;color:#1a68d1}
  .cont-hoy{background:#fff4d6;color:#946c00}
  .cont-ret{background:#fee2e2;color:#b91c1c}
  .cont-ok{background:#dcfce7;color:#15803d}
  /* Buscador de productos (autocomplete) */
  .sug{position:absolute;top:100%;left:0;right:0;z-index:30;background:#fff;border:1px solid var(--linea);border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.12);margin-top:4px;max-height:280px;overflow:auto;display:none}
  .sug.show{display:block}
  .sug .it{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f5f4;font-size:14px;line-height:1.3}
  .sug .it:last-child{border-bottom:none}
  .sug .it:hover{background:#eaf3ef}
  .sug .it small{color:var(--muted)}
  .sug .none{padding:11px 12px;color:var(--muted);font-size:13px}
  tr.cancelada{background:#fef2f2;color:var(--rojo)}
  tr.cancelada td{color:var(--rojo)}
  tr.inactivo{opacity:.5}
  /* Termómetro */
  .termo{position:relative;width:48px;height:210px;background:#eef2f7;border:2px solid #cbd5e1;border-radius:24px;overflow:hidden;flex-shrink:0}
  .termo-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(#5a917d,#3f6f5e);transition:height .45s ease}
  .termo-mark{position:absolute;left:-5px;right:-5px;border-top:2px dashed #b91c1c}
  .rep-tab{border:none;cursor:pointer}
  /* Sumatoria */
  .suma{background:#fff;border-radius:14px;box-shadow:var(--sombra);padding:18px;height:fit-content}
  .suma h3{font-size:18px;margin-bottom:12px;color:#374151}
  .suma .l{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--linea);font-weight:600}
  .suma .l b{font-size:18px}
  .red{color:var(--rojo)}.green{color:var(--ok)}
  /* Tabla */
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--linea);font-size:14px}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:#fafbfc}
  th.th-sort{cursor:pointer;user-select:none;white-space:nowrap;font-weight:700;color:#374151}
  th.th-sort:hover{color:var(--verde2);background:#f1f5f4}
  tbody tr:hover{background:#f7faf9}
  .tabla-ventas td{font-size:12px;padding:8px 10px}
  .tabla-ventas th{font-size:11px;padding:8px 10px}
  .tabla-ventas tbody tr{background:#eef4f1}
  .tabla-ventas tbody tr:nth-child(even){background:#e5efea}
  .tabla-ventas tbody tr:hover{background:#dbe8e2}
  .tabla-ventas tbody tr.cancelada{background:#fef2f2}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
  .b-prod{background:#fff4d6;color:#946c00}
  .b-fab{background:#e0edff;color:#1a68d1}
  .b-ent{background:#dcfce7;color:#15803d}
  .b-pend{background:#fee2e2;color:#b91c1c}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap}
  .search{max-width:280px}
  .acts button{margin-right:4px}
  .estado-sel{padding:5px 8px;font-size:12px;font-weight:700;border-radius:8px;max-width:175px;width:auto;display:inline-block;background:#fff}
  .money-input{position:relative;display:flex;align-items:center}
  .money-input>span{position:absolute;left:9px;font-weight:800;color:#6b7280;pointer-events:none}
  .money-input>input{width:100%;padding-left:20px}
  .no-spin{-moz-appearance:textfield;appearance:textfield}
  .no-spin::-webkit-outer-spin-button,.no-spin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .hint{background:#eaf3ef;border:1px solid #cfe6dc;color:#2c5446;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px}
  .empty{text-align:center;color:var(--muted);padding:26px}
  .switch{display:flex;align-items:center;gap:10px;background:#f3f6f5;border:1px solid var(--linea);border-radius:10px;padding:10px 14px}
  /* Cliente cargado */
  .cli-empty{display:flex;flex-direction:column;align-items:flex-start;gap:12px}
  .cli-card{display:flex;gap:14px;align-items:flex-start;background:#f7faf9;border:1px solid #d9e7e1;border-radius:12px;padding:14px}
  .cli-ico{font-size:26px;line-height:1}
  .cli-data{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
  .cli-data b{font-size:16px}
  .cli-data span{font-size:13px;color:var(--muted)}
  .cli-acts{display:flex;gap:6px;flex-shrink:0}
  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:#fff;border-radius:14px;box-shadow:var(--sombra);padding:16px}
  .kpi .n{font-size:26px;font-weight:800;margin-top:4px}
  .kpi .t{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .bar{height:14px;border-radius:7px;background:var(--verde)}
  .legend{font-size:13px;color:var(--muted)}
  .table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .chkcell{width:34px;text-align:center}
  @media(max-width:820px){
    .side{position:fixed;left:-240px;top:56px;bottom:0;z-index:50;transition:left .2s;box-shadow:2px 0 12px #0002}
    .side.open{left:0}
    .grid2{grid-template-columns:1fr}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .main{padding:16px}
    h1.page{font-size:24px}
  }
  @media(max-width:600px){
    body{font-size:14px}
    .main{padding:12px;max-width:100%}
    h1.page{font-size:21px}
    .card{padding:14px;border-radius:12px}
    .row{gap:10px}
    .field{min-width:120px}
    .toolbar{gap:8px}
    .search{max-width:100%}
    /* Las tablas anchas se deslizan en horizontal para verse bien en el celu */
    .card > table, .table-wrap > table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
    .kpis{grid-template-columns:1fr 1fr;gap:10px}
    .modal{max-width:100%;border-radius:14px}
    .btn{padding:10px 14px}
  }
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:13px 20px;border-radius:10px;box-shadow:0 6px 20px #0004;z-index:120;opacity:0;transition:opacity .25s;font-weight:600}
  .toast.show{opacity:1}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(17,24,39,.55);display:flex;align-items:center;justify-content:center;z-index:80;padding:18px}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:92vh;overflow:auto}
  .modal header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--linea);position:sticky;top:0;background:#fff}
  .modal header h3{font-size:19px;color:var(--verde2)}
  .modal .x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;padding:4px 8px;border-radius:8px}
  .modal .x:hover{background:#0001}
  .modal .body{padding:20px}
  .modal .foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--linea);background:#fafbfc;border-radius:0 0 16px 16px;position:sticky;bottom:0}
  .req{color:var(--rojo)}
  .help{font-size:12px;color:#2c5446;background:#eaf3ef;border:1px solid #cfe6dc;border-radius:8px;padding:8px 10px;margin-top:6px}
  /* Login */
  .login{position:fixed;inset:0;background:linear-gradient(135deg,#eef2fb,#dfeaef);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
  .login-card{background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.18);padding:34px 32px;width:100%;max-width:380px;text-align:center}
  .login-logo{height:44px;margin-bottom:4px}
  .login-sub{font-size:10px;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:12px}
  .login-welcome{font-size:15px;font-weight:700;color:var(--verde);margin-bottom:22px;line-height:1.4}
  .login-err{color:var(--rojo);font-size:13px;font-weight:600;min-height:18px;margin-bottom:8px}
  .login-hint{font-size:11px;color:var(--muted);margin-top:18px;line-height:1.6}
  /* Menú "Ver más" (acciones secundarias de Ventas) */
  .vmenu-wrap{position:relative;display:inline-block}
  .vmenu{position:absolute;right:0;top:calc(100% + 6px);z-index:35;background:#fff;border:1px solid var(--linea);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:6px;min-width:215px;display:none}
  .vmenu.show{display:block}
  .vmenu button{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:#374151;font-family:inherit;font-size:13px;font-weight:600;text-align:left;padding:9px 11px;border-radius:8px;cursor:pointer}
  .vmenu button:hover,.vmenu button:focus{background:#f3f6f5;color:var(--verde2);outline:none}
  .vmenu button:disabled{opacity:.45;cursor:default;background:none;color:#9ca3af}
  /* Ranking de vendedores (leaderboard) */
  .lb-top{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .lb-card{flex:1;min-width:190px;border-radius:14px;padding:16px 18px;border:1px solid var(--linea);background:#fff;box-shadow:var(--sombra)}
  .lb-card .pos{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:7px}
  .lb-card .pos .medal{font-size:22px}
  .lb-card .name{font-size:20px;font-weight:800;margin:4px 0 8px}
  .lb-card .big{font-size:30px;font-weight:800;line-height:1;color:var(--verde2)}
  .lb-card .big small{font-size:13px;font-weight:600;color:var(--muted)}
  .lb-card .sub{font-size:12px;color:var(--muted);margin-top:8px}
  .lb-1{background:linear-gradient(180deg,#fffbeb,#fff);border-color:#f0d27a}
  .lb-2{background:linear-gradient(180deg,#f6f7f9,#fff);border-color:#cbd5e1}
  .lb-row-1 td{background:#fffbeb}
  .lb-row-2 td{background:#f6f7f9}
</style>
</head>
<body>

<div id="loginScreen" class="login">
  <div class="login-card">
    <img id="loginLogo" class="login-logo" alt="Aura">
    <div class="login-sub">MINIPISCINAS · SISTEMA DE GESTIÓN</div>
    <div class="login-welcome">¡Bienvenidos al Sistema de Aura Minipiscinas!</div>
    <div class="field" style="text-align:left;margin-bottom:14px"><label>Usuario</label><input id="logUser" type="text" autocomplete="username" placeholder="tu usuario" onkeydown="if(event.key==='Enter')ingresar()"></div>
    <div class="field" style="text-align:left;margin-bottom:8px"><label>Contraseña</label><input id="logPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')ingresar()"></div>
    <div id="logErr" class="login-err"></div>
    <button class="btn btn-green" style="width:100%;justify-content:center;font-size:16px" onclick="ingresar()">Ingresar</button>
  </div>
</div>

function ingresar(){
  const u=$("#logUser").value.trim(), p=$("#logPass").value;
  const usr=USUARIOS.find(x=>(""+x.user).toLowerCase()===u.toLowerCase() && x.pass===p);
  if(!usr){ $("#logErr").textContent="Usuario o contraseña incorrectos."; return; }
  if(usr.activo===false){ $("#logErr").textContent="Usuario inactivo. Consultá con el administrador."; return; }
  USUARIO_ACTUAL = {nombre:usr.nombre, ap:usr.ap, rol:usr.rol};
  $("#logErr").textContent="";
  $("#loginScreen").style.display="none";
  $("#appWrap").style.display="";
  actualizarTopbarUsuario();
  vistaActual = tabsPermitidas()[0];
  nav(vistaActual);
}
function salir(){
  $("#appWrap").style.display="none";
  $("#loginScreen").style.display="flex";
  $("#logPass").value=""; $("#logErr").textContent="";
  const u=$("#logUser"); if(u) u.focus();
}

function cerrarModal(){ $("#modalRoot").innerHTML = ""; }

function guardarCliente(){
  const campos = {
    nombre:$("#cNombre"), apellido:$("#cApellido"), dni:$("#cDni"),
    tel:$("#cTel"), provincia:$("#cProvincia"), localidad:$("#cLocalidad"), mail:$("#cMail")
  };
  let faltan = false;
  Object.values(campos).forEach(el=>{
    const vacio = !el.value.trim();
    el.classList.toggle("err", vacio);
    if(vacio) faltan = true;
  });
  if(faltan){ toast("⚠️ Completá todos los campos obligatorios (*)"); return; }
  const mail = campos.mail.value.trim();
  if(!/^\S+@\S+\.\S+$/.test(mail)){ campos.mail.classList.add("err"); toast("⚠️ Revisá el email del cliente"); return; }

  const datos = {
    nombre:campos.nombre.value.trim(), apellido:campos.apellido.value.trim(),
    dni:campos.dni.value.trim(), tel:campos.tel.value.trim(),
    provincia:campos.provincia.value, localidad:campos.localidad.value.trim(), mail
  };

  if(modalModo==="venta" && clienteActual){
    // editar el cliente ya cargado en la venta
    Object.assign(clienteActual, datos);
    const reg = CLIENTES.find(x=>x.id===clienteActual.id);
    if(reg) Object.assign(reg, {nombre:`${datos.nombre} ${datos.apellido}`, dni:datos.dni, tel:datos.tel, mail:datos.mail, provincia:datos.provincia, localidad:datos.localidad});
  } else {
    // alta de cliente nuevo
    const id = Math.max(0, ...CLIENTES.map(c=>c.id)) + 1;
    const nuevo = {id, nombre:`${datos.nombre} ${datos.apellido}`, apellido:datos.apellido, dni:datos.dni, tel:datos.tel, mail:datos.mail, provincia:datos.provincia, localidad:datos.localidad, saldo:0};
    CLIENTES.push(nuevo);
    if(modalModo==="venta") clienteActual = {id, ...datos};
  }

  cerrarModal();
  if(modalModo==="venta"){ renderClienteBox(); toast("✅ Cliente cargado"); }
  else { viewClientes(); toast("✅ Cliente agregado"); }
}

function cambiarCliente(){ clienteActual = null; renderClienteBox(); }

/* ====== PRODUCTOS EN LA VENTA ====== */
function filtrarProductos(q){
  const box=$("#vProdSug"); if(!box) return;
  q=(q||"").trim().toLowerCase();
  vProdSel=null; // al escribir se resetea la selección
  if(q.length<3){ box.classList.remove("show"); box.innerHTML=""; return; }
  const activos=PRODUCTOS.filter(p=>p.activo!==false);
  const matches=activos.filter(p=>(p.nombre+" "+(p.desc||"")+" "+(p.cat||"")).toLowerCase().includes(q)).slice(0,8);
  box.innerHTML = matches.length
    ? matches.map(p=>`<div class="it" onmousedown="elegirProducto(${p.id})"><b>${p.nombre}</b> <small>· ${p.desc||''}</small><br><small>${p.cat} — ${money(p.precio)}</small></div>`).join("")
    : `<div class="none">Sin coincidencias para "${q}"</div>`;
  box.classList.add("show");
}
function elegirProducto(id){
  const p=PRODUCTOS.find(x=>x.id===id); if(!p) return;
  vProdSel=id;
  $("#vProdBuscar").value=`${p.nombre}${p.desc?' · '+p.desc:''}`;
  const box=$("#vProdSug"); box.classList.remove("show"); box.innerHTML="";
}
function addItem(){
  if(vProdSel==null){ toast("⚠️ Buscá y elegí un producto de la lista"); return; }
  const p = PRODUCTOS.find(x=>x.id===vProdSel); if(!p) return;
  const cant = Math.max(1,+$("#vCant").value||1);
  const ex = carrito.find(i=>i.id===p.id);
  if(ex) ex.cant+=cant; else carrito.push({id:p.id,nombre:p.nombre+(p.desc?" · "+p.desc:""),precio:p.precio,cant});
  vProdSel=null; $("#vProdBuscar").value=""; $("#vCant").value=1;
  renderItems();
}
function delItem(id){carrito=carrito.filter(i=>i.id!==id);renderItems();}
function setVentaFactura(b){ ventaFactura=!!b; renderItems(); }
function renderItems(){
  const head=$("#vItemsHead"), tb=$("#vItems"); if(!tb) return;
  if(head){ head.innerHTML = ventaFactura
    ? `<tr><th>Cant.</th><th>Producto</th><th>Precio</th><th>IVA 21%</th><th>Subtotal</th><th></th></tr>`
    : `<tr><th>Cant.</th><th>Producto</th><th>Precio</th><th>Subtotal</th><th></th></tr>`; }
  const colspan = ventaFactura?6:5;
  if(!carrito.length){tb.innerHTML=`<tr><td colspan="${colspan}" class="empty">Todavía no agregaste productos.</td></tr>`;recalc();return;}
  tb.innerHTML=carrito.map(i=>{
    const base=i.precio*i.cant, iva=ventaFactura?base*IVA_PCT:0;
    return ventaFactura
      ? `<tr><td>${i.cant}</td><td>${i.nombre}</td><td>${money(i.precio)}</td><td>${money(iva)}</td><td>${money(base+iva)}</td><td><button class="btn btn-ghost btn-sm" onclick="delItem(${i.id})">🗑️</button></td></tr>`
      : `<tr><td>${i.cant}</td><td>${i.nombre}</td><td>${money(i.precio)}</td><td>${money(base)}</td><td><button class="btn btn-ghost btn-sm" onclick="delItem(${i.id})">🗑️</button></td></tr>`;
  }).join("");
  recalc();
}
function recalc(){
  const total=carrito.reduce((a,i)=>a+i.precio*i.cant,0);
  const iva=ventaFactura?total*IVA_PCT:0;
  const gran=total+iva;
  const cobrado=Math.min(gran,+($("#vCobro")?.value||0));
  if($("#sTotal")){
    $("#sTotalLbl").textContent = ventaFactura?"Subtotal":"Total";
    $("#sTotal").textContent=money(total);
    $("#sIvaRow").style.display = ventaFactura?"flex":"none";
    $("#sGranRow").style.display = ventaFactura?"flex":"none";
    if(ventaFactura){ $("#sIva").textContent=money(iva); $("#sGran").textContent=money(gran); }
    $("#sCobrado").textContent=money(cobrado);
    $("#sSaldo").textContent=money(gran-cobrado);
  }
}
function confirmarVenta(){
  if(!clienteActual){toast("⚠️ Cargá el cliente primero");return;}
  if(!carrito.length){toast("⚠️ Agregá al menos un producto");return;}
  const c=clienteActual;
  const total=carrito.reduce((a,i)=>a+i.precio*i.cant,0);
  const iva=ventaFactura?total*IVA_PCT:0;
  const gran=total+iva;
  const cobrado=Math.min(gran,+$("#vCobro").value||0);
  const metodo=($("#vPago")?.value||"Efectivo");
  const nro=Math.max(0,...VENTAS.map(v=>v.nro))+1;
  const pagos=cobrado>0?[{monto:cobrado,metodo,fecha:hoyISO(),usuario:nombreUsuario()}]:[];
  VENTAS.unshift({nro,cliente:`${c.nombre} ${c.apellido}`,localidad:`${c.localidad} (${c.provincia})`,provincia:c.provincia,total,iva,factura:ventaFactura,saldo:gran-cobrado,estado:"Procesando pedido",vendedor:nombreUsuario(),fecha:hoyISO(),entrega:($("#vEntrega")?.value||""),clienteId:c.id,items:carrito.map(i=>({nombre:i.nombre,precio:i.precio,cant:i.cant})),pagos,nota:($("#vNota")?.value||"").trim()});
  descontarStockVenta(carrito);
  auditar("Venta creada","venta",nro,`Cliente ${c.nombre} ${c.apellido} · Total ${money(gran)}${ventaFactura?' (c/IVA)':''}`);
  const remito=$("#vRemito").checked;
  toast(`✅ Venta #${nro} cargada`+(remito?` · remito enviado a ${c.mail}`:""));
  nav("ventas");
}
/* Descuento de stock automático para los productos marcados (stock numérico). */
function descontarStockVenta(items){
  (items||[]).forEach(it=>{
    const p = PRODUCTOS.find(x=>x.id===it.id) || PRODUCTOS.find(x=>(x.nombre+(x.desc?" · "+x.desc:""))===it.nombre);
    if(p && p.descStock && !isNaN(+p.stock)){ p.stock = String(Math.max(0, (+p.stock) - (it.cant||0))); if(window.persistirStock) window.persistirStock(p); }
  });
}
function restaurarStockVenta(items){
  (items||[]).forEach(it=>{
    const p = PRODUCTOS.find(x=>x.id===it.id) || PRODUCTOS.find(x=>(x.nombre+(x.desc?" · "+x.desc:""))===it.nombre);
    if(p && p.descStock && !isNaN(+p.stock)){ p.stock = String((+p.stock) + (it.cant||0)); if(window.persistirStock) window.persistirStock(p); }
  });
}
/* Total con IVA de una venta (compat con ventas viejas sin iva). */
function granTotal(v){ return Number(v.total||0) + Number(v.iva||0); }

function estBadge(e){ return `<b>${e}</b>`; }

function thSort(label,key){
  const act = ventasSort.key===key;

/* Helpers de fecha */
function ymdLocal(dt){return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
function hoyISO(){return ymdLocal(new Date());}
function isoMenosDias(n){const d=new Date();d.setDate(d.getDate()-n);return ymdLocal(d);}
function fmtFechaCorta(iso){if(!iso)return "—";const p=iso.split("-");return `${p[2]}/${p[1]}/${p[0]}`;}
function diffDias(iso){ if(!iso) return null; const a=new Date(hoyISO()+"T00:00:00"), b=new Date(iso+"T00:00:00"); return Math.round((b-a)/86400000); }
function entregaCell(v){
  if(!v.entrega) return "—";
  const f=fmtFechaCorta(v.entrega);
  if(v.estado==="Entregado al Cliente" || v.estado==="En servicio de Post Venta") return `${f}<br><span class="cont cont-ok">✓ Entregado</span>`;
  if(v.estado==="Presupuesto") return f;
  const d=diffDias(v.entrega);
  if(d>0)  return `${f}<br><span class="cont cont-rest" style="font-weight:800">${d} día${d===1?'':'s'} restante${d===1?'':'s'}</span>`;
  if(d===0) return `${f}<br><span class="cont cont-hoy" style="font-weight:800">Vence hoy</span>`;
  const r=-d; return `${f}<br><span class="cont cont-ret" style="font-weight:800">${r} día${r===1?'':'s'} de retraso</span>`;
}
function montoAR(n){ return (n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fraseEstado(e){
  const m={
    "Presupuesto":"Le acercamos el detalle de su presupuesto.",
    "Procesando pedido":"Su orden está siendo preparada.",
    "En fabricación":"Su pileta ya está en fabricación.",
    "Pedido Terminado":"¡Su pedido ya está terminado!",
    "Entregado al Cliente":"¡Su pedido fue entregado! Muchas gracias por su compra.",
    "En servicio de Post Venta":"Su pedido está en servicio de post venta."
  };
  return m[e]||"Su orden está siendo preparada.";
}

function viewRanking(){
  const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const now=new Date(), cy=now.getFullYear(), cm=now.getMonth();
  const acc={};
  VENTAS.forEach(v=>{
    if(v.cancelada) return;
    const vend=(v.vendedor||"").trim(); if(!vend) return;
    const f=(v.fecha||""); const y=+f.slice(0,4), m=+f.slice(5,7)-1;
    if(y!==cy) return;
    acc[vend]=acc[vend]||{nombre:vend,mes:0,anio:0};
    acc[vend].anio++;
    if(m===cm) acc[vend].mes++;
  });
  let lista=Object.values(acc).filter(x=>x.anio>0);
  lista.sort((a,b)=> (b.mes-a.mes) || (b.anio-a.anio) || a.nombre.localeCompare(b.nombre,'es'));
  const filas = lista.map((x,i)=>`
      <tr>
        <td style="color:var(--muted);white-space:nowrap">${i+1}</td>
        <td>${x.nombre}</td>
        <td style="font-weight:800;font-size:15px">${x.mes}</td>
        <td style="color:var(--muted)">${x.anio}</td>
      </tr>`).join("");
  $("#main").innerHTML=`
    <h1 class="page">🤝 Equipo de ventas</h1>
    <div class="hint">💡 Cantidad de ventas de cada vendedor. Se mide por el <b>mes en curso</b> (${meses[cm]} ${cy}); el acumulado anual va como referencia.</div>
    ${lista.length?`
      <div class="card">
        <div class="toolbar"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><b style="font-size:16px">Ventas por vendedor</b><span class="legend">${meses[cm]} ${cy} · ordenado por ventas del mes</span></div></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>N°</th><th>Vendedor</th><th>Ventas del mes</th><th>Acumulado ${cy}</th></tr></thead>
            <tbody>${filas}</tbody>
          </table>
        </div>
      </div>`
    :`<div class="card"><div class="empty">Todavía no hay ventas registradas en ${cy}.</div></div>`}
  `;
}

function cerrarVentasMenu(){ const m=$("#ventasMasMenu"); if(m) m.classList.remove("show"); const b=$("#ventasMasBtn"); if(b) b.setAttribute("aria-expanded","false"); }
document.addEventListener("click",function(e){ const m=$("#ventasMasMenu"); if(!m||!m.classList.contains("show")) return; const w=m.closest(".vmenu-wrap"); if(w && !w.contains(e.target)) cerrarVentasMenu(); });

function limpiarFiltros(){ ventasQuery=""; ventasEstado=""; ventasVendedor=""; ventasProvincia=""; setRango('30'); }
function setRango(tipo){
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  if(tipo==="30"){ ventasDesde=isoMenosDias(30); ventasHasta=hoyISO(); }
  else if(tipo==="mes"){ ventasDesde=ymdLocal(new Date(y,m,1)); ventasHasta=hoyISO(); }
  else if(tipo==="mesant"){ ventasDesde=ymdLocal(new Date(y,m-1,1)); ventasHasta=ymdLocal(new Date(y,m,0)); }
  else if(tipo==="todo"){ ventasDesde=""; ventasHasta=""; }
  viewVentas();
}
function setVentasSort(key){
  if(ventasSort.key===key){ ventasSort.dir = ventasSort.dir==="asc" ? "desc" : "asc"; }
  else { ventasSort.key=key; ventasSort.dir = ["nro","fecha","entrega","total","saldo"].includes(key) ? "desc" : "asc"; }
  viewVentas(); // re-render para actualizar los indicadores de los encabezados
}

function ventasFiltradas(){
  const q=(ventasQuery||"").trim().toLowerCase();
  let rows=VENTAS.filter(v=>{
    if(ventasDesde && v.fecha<ventasDesde) return false;
    if(ventasHasta && v.fecha>ventasHasta) return false;
    if(ventasEstado && v.estado!==ventasEstado) return false;
    if(ventasVendedor && v.vendedor!==ventasVendedor) return false;
    if(ventasProvincia && (v.provincia||"")!==ventasProvincia) return false;
    if(q){
      const c=CLIENTES.find(x=>x.id===v.clienteId)||{};
      const txt=("#"+v.nro+" "+(v.cliente||"")+" "+(v.vendedor||"")+" "+(v.localidad||"")+" "+(v.provincia||"")+" "+(v.nota||"")+" "+(c.tel||"")+" "+(c.mail||"")+" "+(c.dni||"")).toLowerCase();
      if(!txt.includes(q.replace(/^#/,''))) return false;
    }
    return true;
  });
  const {key,dir}=ventasSort, mul=dir==="asc"?1:-1, num=["nro","total","saldo"].includes(key);
  const keyVal=(v)=> key==="total" ? granTotal(v) : v[key];
  return rows.slice().sort((a,b)=> num ? (keyVal(a)-keyVal(b))*mul : (""+a[key]).localeCompare(""+b[key],'es',{sensitivity:'base'})*mul );
}

function exportarExcel(soloSeleccion){
  if(!puede('exportar')){ toast("No tenés permiso para exportar"); return; }
  let rows=ventasFiltradas();
  if(soloSeleccion){
    rows=rows.filter(v=>ventasSel.has(v.nro));
    if(!rows.length){ toast("⚠️ No tildaste ninguna venta. Marcá las casillas y volvé a intentar."); return; }
  }
  if(!rows.length){ toast("⚠️ No hay ventas para exportar en este rango"); return; }
  const cols=["Nro.","Fecha","Fecha Prometida","Cliente","Provincia","Localidad","Teléfono","Email","Productos","Cantidades","Precios","¿Factura?","Total sin IVA","IVA","Subtotal (c/IVA)","Cobrado","Saldo","Pagos registrados","Estado","Observaciones","Vendedor"];
  const filas=rows.map(v=>{
    const c=CLIENTES.find(x=>x.id===v.clienteId)||{};
    const items=v.items||[];
    const prods=items.map(i=>i.nombre).join(" | ");
    const cants=items.map(i=>i.cant).join(" | ");
    const precios=items.map(i=>montoAR(i.precio)).join(" | ");
    const pagos=(v.pagos||[]).map(p=>`${montoAR(p.monto)}${p.metodo?` (${p.metodo}`:''}${p.fecha?`${p.metodo?', ':' ('}${fmtFechaCorta(p.fecha)})`:(p.metodo?')':'')}`).join(" | ");
    return {"Nro.":v.nro,"Fecha":fmtFechaCorta(v.fecha),"Fecha Prometida":fmtFechaCorta(v.entrega),"Cliente":v.cliente,"Provincia":v.provincia||"","Localidad":v.localidad,"Teléfono":c.tel||"","Email":c.mail||"","Productos":prods,"Cantidades":cants,"Precios":precios,"¿Factura?":v.factura?"Sí":"No","Total sin IVA":Number(v.total||0),"IVA":Number(v.iva||0),"Subtotal (c/IVA)":granTotal(v),"Cobrado":granTotal(v)-Number(v.saldo||0),"Saldo":Number(v.saldo||0),"Pagos registrados":pagos,"Estado":v.cancelada?"Cancelada":v.estado,"Observaciones":v.nota||"","Vendedor":v.vendedor};
  });
  const nombre=(soloSeleccion?`Ventas_seleccion_`:`Ventas_`)+`${ventasDesde||'inicio'}_a_${ventasHasta||'hoy'}`;
  if(window.XLSX){
    const ws=XLSX.utils.json_to_sheet(filas,{header:cols});
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Ventas");
    XLSX.writeFile(wb, nombre+".xlsx");
    toast(`✅ ${rows.length} venta(s) exportadas a Excel`);
  } else {
    const esc=s=>`"${(""+s).replace(/"/g,'""')}"`;
    const csv=[cols.join(";")].concat(filas.map(f=>cols.map(k=>esc(f[k])).join(";"))).join("\r\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"}));
    a.download=nombre+".csv"; a.click();
    toast(`✅ ${rows.length} venta(s) exportadas (CSV para Excel)`);
  }
}

/* ---- Exportar SELECCIÓN a Excel con diseño (ExcelJS, columnas resumidas) ---- */
function cargarExcelJS(){
  return new Promise((resolve,reject)=>{
    if(window.ExcelJS) return resolve();
    const sc=document.createElement('script');
    sc.src='https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
    sc.onload=()=>resolve(); sc.onerror=()=>reject(new Error('No se pudo cargar ExcelJS'));
    document.head.appendChild(sc);
  });
}
async function exportarSeleccionExcel(){
  if(!puede('exportar')){ toast("No tenés permiso para exportar"); return; }
  const rows=ventasFiltradas().filter(v=>ventasSel.has(v.nro));
  if(!rows.length){ toast("⚠️ No tildaste ninguna venta. Marcá las casillas y volvé a intentar."); return; }
  toast("Generando Excel…");
  try{ await cargarExcelJS(); }catch(e){ toast("⚠️ Necesitás conexión a internet para el Excel con diseño."); return; }
  try{
    const VERDE="FF3F6F5E",VERDE2="FF345C4E",GRISH="FFEAF3EF",ROJO="FFDC2626",VERDEOK="FF16A34A",LINEA="FFE5E7EB";
    const thin={style:'thin',color:{argb:LINEA}}, bAll={top:thin,left:thin,bottom:thin,right:thin};
    const wb=new ExcelJS.Workbook(); wb.creator="Aura Minipiscinas";
    const ws=wb.addWorksheet("Ventas seleccionadas",{views:[{state:'frozen',ySplit:2}]});
    ws.mergeCells('A1:G1');
    const tt=ws.getCell('A1'); tt.value="Aura Minipiscinas · Ventas seleccionadas";
    tt.font={bold:true,size:14,color:{argb:'FFFFFFFF'}}; tt.fill={type:'pattern',pattern:'solid',fgColor:{argb:VERDE2}};
    tt.alignment={vertical:'middle',horizontal:'left',indent:1}; ws.getRow(1).height=26;
    const headers=["Cliente","Provincia","Localidad","Teléfono","Producto","Precio","Saldo pendiente"];
    const hr=ws.getRow(2);
    for(let i=0;i<headers.length;i++){ const cc=hr.getCell(i+1); cc.value=headers[i]; cc.font={bold:true,color:{argb:'FFFFFFFF'},size:11}; cc.fill={type:'pattern',pattern:'solid',fgColor:{argb:VERDE}}; cc.alignment={vertical:'middle',horizontal:'center'}; cc.border=bAll; }
    hr.height=20;
    const ancho=[26,16,18,18,36,18,18]; for(let i=0;i<ancho.length;i++) ws.getColumn(i+1).width=ancho[i];
    rows.forEach((v,idx)=>{
      const c=CLIENTES.find(x=>x.id===v.clienteId)||{};
      const items=v.items||[];
      const prod=items.length?items.map(i=>i.nombre).join("\n"):"—";
      const precio=items.length?items.map(i=>"$ "+(i.precio||0).toLocaleString("es-AR")).join("\n"):"";
      const saldo=Number(v.saldo||0);
      const r=ws.addRow([ v.cliente||"", v.provincia||c.provincia||"", c.localidad||v.localidad||"", c.tel||"", prod, precio, saldo ]);
      const zebra=idx%2===1;
      for(let col=1;col<=7;col++){
        const cell=r.getCell(col);
        cell.border=bAll; cell.alignment={vertical:'middle',wrapText:true};
        if(zebra) cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:GRISH}};
        if(col===6) cell.alignment={vertical:'middle',horizontal:'right',wrapText:true};
        if(col===7){ cell.numFmt='"$ "#,##0'; cell.alignment={vertical:'middle',horizontal:'right'}; cell.font={bold:true,color:{argb: saldo>0?ROJO:VERDEOK}}; }
      }
    });
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="Ventas_seleccion_Aura.xlsx"; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500);
    toast(`✅ ${rows.length} venta(s) exportadas con diseño`);
  }catch(ex){ toast("⚠️ Error generando el Excel: "+(ex.message||ex)); }
}

function renderTablaVentas(){
  const tb=$("#tVentas"); if(!tb) return;
  const allRows=ventasFiltradas();
  const total=allRows.length;
  const lim=(ventasLimite==='todas') ? total : (parseInt(ventasLimite,10)||10);
  const rows=allRows.slice(0,lim);
  const info=$("#ventasInfo");
  if(info){
    const rango=(ventasDesde||ventasHasta) ? `· ${fmtFechaCorta(ventasDesde)} a ${fmtFechaCorta(ventasHasta)}` : "· todo el período";
    const canc=allRows.filter(v=>v.cancelada).length;
    info.textContent=`Mostrando ${rows.length} de ${total} ${rango}`+(canc?` · ${canc} cancelada${canc===1?'':'s'}`:"");
  }
  tb.innerHTML=rows.length?rows.map(v=>{
    const canc=v.cancelada;
    const estadoCell = canc
      ? `<b style="color:var(--rojo)">Cancelada</b>`
      : ((esMaestro()||esAdmin())
          ? `<select class="estado-sel" onchange="cambiarEstadoInline(${v.nro}, this.value)">${ESTADOS.map(e=>`<option ${v.estado===e.nombre?'selected':''}>${e.nombre}</option>`).join("")}</select>`
          : estBadge(v.estado));
    const ivaTag = v.factura ? `<br><span class="cont cont-rest">c/IVA</span>` : "";
    return `
    <tr class="${canc?'cancelada':''}">
    <td class="chkcell"><input type="checkbox" style="width:auto" ${ventasSel.has(v.nro)?'checked':''} onclick="toggleSelVenta(${v.nro},this.checked)"></td>

      ${(!canc && puede('editar_venta'))?`<button class="btn btn-ghost btn-sm" title="Editar venta" onclick="abrirEditarVenta(${v.nro})">✏️</button>`:''}
      ${(!canc && (esMaestro()||esAdmin()) && (v.saldo>0 || (v.pagos&&v.pagos.length)))?`<button class="btn btn-ghost btn-sm" title="Cobros / saldo" onclick="cobrarSaldo(${v.nro})">💲</button>`:''}
      ${(!canc && puede('cancelar_venta'))?`<button class="btn btn-ghost btn-sm" title="Cancelar venta" onclick="abrirCancelarVenta(${v.nro})">✖️</button>`:''}
      <button class="btn btn-ghost btn-sm" title="Ver orden completa" onclick="abrirOrden(${v.nro})">👁️</button>
      <button class="btn btn-ghost btn-sm" title="Reenviar comprobante / correo al cliente" onclick="abrirReenviar(${v.nro})">📤</button>
    </td></tr>`;}).join(""):`<tr><td colspan="11" class="empty">Sin resultados en este rango o con estos filtros.</td></tr>`;
  updateSelCount();
  const ca=$("#chkAll"); if(ca){ ca.checked = rows.length>0 && rows.every(v=>ventasSel.has(v.nro)); }
}

/* Cancelar: según permiso 'cancelar_venta'. */
function puedeCancelar(v){ return puede('cancelar_venta'); }
function abrirCancelarVenta(nro){
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return;
  if(!puedeCancelar(v)){ toast("No tenés permiso para cancelar esta venta"); return; }
  if(v.cancelada){ toast("Esa venta ya está cancelada"); return; }
  $("#modalRoot").innerHTML=`

function confirmarCancelarVenta(nro){
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return;
  v.cancelada=true; v.estadoPrevio=v.estado; v.canceladaPor=nombreUsuario(); v.fechaCancelada=hoyISO();

  cerrarModal(); renderTablaVentas(); toast(`✖️ Venta #${nro} cancelada (queda registrada)`);
}

/* Generar el remito como PDF real (texto, no imagen) — archivo adjuntable */
function descargarRemitoPDF(nro){
  const v=VENTAS.find(x=>x.nro===nro); if(!v){ toast("Venta no encontrada"); return; }
  if(!window.jspdf || !window.jspdf.jsPDF){ toast("⚠️ Necesitás conexión a internet para generar el PDF"); return; }
  const c=CLIENTES.find(x=>x.id===v.clienteId)||{};
  const items=v.items||[];
  const piezas=items.reduce((a,i)=>a+(i.cant||0),0);
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const W=doc.internal.pageSize.getWidth(), M=40;
  doc.setDrawColor(70);

  // Banda ORIGINAL
  doc.setLineWidth(1); doc.rect(M, M, W-2*M, 20);
  doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(0);
  doc.text("ORIGINAL", W/2, M+14, {align:"center"});

  // Encabezado
  let top=M+20; doc.rect(M, top, W-2*M, 66);
  doc.setTextColor(63,111,94); doc.setFontSize(17); doc.text("AURA", M+14, top+30);
  doc.setFontSize(7); doc.setTextColor(107,114,128); doc.text("M I N I P I S C I N A S", M+14, top+42);
  doc.setTextColor(0); doc.setLineWidth(0.8); doc.rect(W/2-26, top+12, 52, 34);
  doc.setFont("helvetica","bold"); doc.setFontSize(17); doc.text("R", W/2, top+32, {align:"center"});
  doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.text("Cod. 000", W/2, top+42, {align:"center"});
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(`Venta N°${v.nro}`, W-M-12, top+22, {align:"right"});
  doc.setFontSize(9); doc.text(`Vendedor: ${v.vendedor}`, W-M-12, top+38, {align:"right"});
  doc.setFont("helvetica","normal"); doc.text(`Fecha de emisión: ${fmtFechaCorta(v.fecha)}`, W-M-12, top+52, {align:"right"});

  // Datos del cliente (DNI, Localidad, Apellido y Nombre, Teléfono)
  let cy=top+66; doc.setLineWidth(1); doc.rect(M, cy, W-2*M, 54);
  doc.setFontSize(9); doc.setTextColor(0);
  const kv=(x,yy,label,value)=>{ doc.setFont("helvetica","bold"); doc.text(label,x,yy); const w=doc.getTextWidth(label); doc.setFont("helvetica","normal"); doc.text(" "+String(value==null||value===''?'—':value), x+w, yy); };
  kv(M+10, cy+16, "DNI:", c.dni);
  kv(M+10, cy+32, "Localidad:", v.localidad);
  kv(M+10, cy+48, "Condición frente al IVA:", "Consumidor Final");
  kv(W/2+8, cy+16, "Apellido y Nombre:", v.cliente);
  kv(W/2+8, cy+32, "Teléfono:", c.tel);

  // Tabla de ítems
  doc.autoTable({
    startY: cy+64,
    head: [["Código","Producto / Servicio","Cantidad","U. Medida","Precio unit.","% Bonif","Imp. Bonif.","Subtotal"]],
    body: items.length ? items.map(i=>["", i.nombre, (i.cant||0).toFixed(3), "Unidades", montoAR(i.precio), "0,00", "0,00", montoAR(i.precio*i.cant)]) : [["","Sin ítems","","","","","",""]],
    styles:{ fontSize:8, cellPadding:3, lineColor:[210,210,210], lineWidth:0.3 },
    headStyles:{ fillColor:[240,243,244], textColor:40, fontStyle:"bold", lineColor:[70,70,70], lineWidth:0.5 },
    columnStyles:{ 0:{cellWidth:50}, 2:{halign:"right"}, 3:{halign:"center"}, 4:{halign:"right"}, 5:{halign:"right"}, 6:{halign:"right"}, 7:{halign:"right"} },
    margin:{ left:M, right:M }, theme:"grid"
  });

  // Totales al PIE de la hoja (el medio queda en blanco)
  const H=doc.internal.pageSize.getHeight();
  let y=Math.max(doc.lastAutoTable.finalY+30, H-175);
  doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(0);
  doc.text(`Total piezas: ${piezas}`, W-M, y, {align:"right"}); y+=10;
  doc.setLineWidth(0.5); doc.line(M, y, W-M, y); y+=16;
  const linea=(lbl,val,under)=>{
    doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(lbl, W-M-115, y, {align:"right"});
    doc.text(val, W-M, y, {align:"right"});
    if(under){ doc.setLineWidth(0.6); doc.line(W-M-72, y+2, W-M, y+2); }
    y+=16;
  };
  linea("Subtotal: ARS", montoAR(v.total));
  linea((v.factura?"IVA 21%: ARS":"Importe otros tributos: ARS"), montoAR(v.factura?(v.iva||0):0));
  linea("Importe total: ARS", montoAR(granTotal(v)), true);
  y+=4;
  linea("Total recibido: ARS", montoAR(granTotal(v)-v.saldo));
  linea("Saldo adeudado: ARS", montoAR(v.saldo), true);

  y+=10; doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(90);
  doc.text("Pag. 1/1", W/2, y, {align:"center"});
  y+=16; doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(0);
  doc.text("Documento no válido como factura", M, y);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(120);
  doc.text("Aura Minipiscinas — Av. Rafael Núñez 3961, X5000 Córdoba — @Aura.minipiscinas", W/2, H-28, {align:"center"});

  doc.save(`Venta_nro_${v.nro}_Comprobante_R.pdf`);
  toast(`✅ PDF del remito de la venta #${v.nro} generado`);
}

/* ====== COBROS (misma estructura que Editar venta: agregar a la lista + Confirmar) ====== */
let cobroWork = [];       // copia de trabajo de los pagos de la venta abierta
let cobroEditIdx = null;  // índice del pago que se edita en línea

function cobrarSaldo(nro){
  if(!(esMaestro()||esAdmin())){ toast("Solo Administrador o Maestro pueden gestionar cobros"); return; }
  const v=VENTAS.find(x=>x.nro===nro); if(!v){ toast("Venta no encontrada"); return; }
  if(v.cancelada){ toast("La venta está cancelada"); return; }
  const total=granTotal(v);
  const cobradoPrevio=Math.max(0, total-Number(v.saldo||0));
  cobroWork=(v.pagos&&v.pagos.length)
    ? v.pagos.map(p=>({monto:Number(p.monto||0), metodo:p.metodo||'Efectivo', fecha:p.fecha||v.fecha, usuario:p.usuario||v.vendedor||''}))
    : (cobradoPrevio>0 ? [{monto:cobradoPrevio, metodo:'Inicial', fecha:v.fecha, usuario:v.vendedor||''}] : []);
  cobroEditIdx=null;
  renderCobros(nro);
}

function cobroSum(){ return cobroWork.reduce((a,p)=>a+Number(p.monto||0),0); }

function renderCobros(nro){
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return;
  const total=granTotal(v);
  const c=CLIENTES.find(x=>x.id===v.clienteId)||{}; const mail=c.mail||'';
  const restante=total-cobroSum();
  const METODOS=['Efectivo','Transferencia','Tarjeta','Cuenta corriente'];

  let lista;
  if(!cobroWork.length){
    lista=`<div class="legend" style="padding:4px 0">Todavía no hay cobros. Agregá uno abajo.</div>`;
  } else {
    lista=cobroWork.map((p,i)=>{
      if(cobroEditIdx===i){
        const sumOtros=cobroWork.reduce((a,x,j)=>a+(j===i?0:Number(x.monto||0)),0);
        const maxEdit=Math.max(0,total-sumOtros);
        return `<div style="display:flex;align-items:center;gap:6px;padding:7px 0;flex-wrap:wrap;border-bottom:1px dashed var(--linea)">
            <div class="money-input" style="flex:0 0 130px"><span>$</span><input type="number" id="cobEditMonto" class="no-spin" value="${p.monto}" min="0" max="${maxEdit}" oninput="cobroLiveTot(${nro})"></div>
            <select id="cobEditMetodo" style="flex:1;min-width:130px">${METODOS.map(m=>`<option ${p.metodo===m?'selected':''}>${m}</option>`).join('')}</select>
            <button class="btn btn-green btn-sm" onclick="cobroSavePago(${nro},${i})">Guardar</button>
            <button class="btn btn-ghost btn-sm" onclick="cobroCancelEdit(${nro})">Cancelar</button>
          </div>`;
      }
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--linea)">
          <span><b>${money(p.monto)}</b> <span class="legend">· ${p.metodo||'—'}${p.fecha?` · ${fmtFechaCorta(p.fecha)}`:''}</span></span>
          <span><button class="btn btn-ghost btn-sm" title="Editar este cobro" onclick="cobroEditPago(${nro},${i})">✏️</button> <button class="btn btn-ghost btn-sm" title="Quitar este cobro" onclick="cobroDelPago(${nro},${i})">🗑️</button></span>
        </div>`;
    }).join("");
  }

  const adder = (restante>0 && cobroEditIdx===null)
    ? `<div class="row" style="align-items:end;margin-top:10px">
         <div class="field" style="flex:0 0 150px"><label>Agregar pago</label><div class="money-input"><span>$</span><input type="number" id="cobMonto" class="no-spin" value="${restante}" min="0" max="${restante}" placeholder="0"></div></div>
         <div class="field" style="flex:2"><label>Método</label><select id="cobMetodo">${METODOS.map(m=>`<option>${m}</option>`).join('')}</select></div>
         <button class="btn btn-green" onclick="cobroAddPago(${nro})">＋ Pago</button>
       </div>`
    : (cobroEditIdx===null ? `<div class="help" style="margin-top:8px">La venta queda <b>saldada</b> ($0). Si te equivocaste, editá (✏️) o quitá (🗑️) un cobro.</div>` : '');

  const mailRow = `<div class="switch" style="margin-top:12px"><input type="checkbox" id="cobMail" ${mail?'checked':''} ${mail?'':'disabled'} style="width:auto"><label for="cobMail" style="text-transform:none;font-weight:600;color:#374151">Enviar comprobante (remito) actualizado por mail al cliente${mail?'':' — este cliente no tiene email'}</label></div>`;

  $("#modalRoot").innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
      <div class="modal" style="max-width:500px">
        <header><h3>💲 Cobros · Venta #${nro}</h3><button class="x" onclick="cerrarModal()">✕</button></header>
        <div class="body">
          <div class="field"><label>Cliente</label><div style="font-weight:600;padding:2px 0">${v.cliente}</div></div>
          <h4 style="margin:14px 0 4px;color:#374151">Pagos</h4>
          <div>${lista}</div>
          ${adder}
          ${cobroEditIdx===null?mailRow:''}
          <div class="suma" style="box-shadow:none;border:1px solid var(--linea);margin-top:14px" id="cobTotales"></div>
        </div>
        <div class="foot">
          <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
          <button class="btn btn-green" onclick="confirmarCobros(${nro})">✅ Confirmar cobro</button>
        </div>
      </div>
    </div>`;
  cobroRenderTot(nro);
}

function cobroTotHTML(total, cobrado){
  const saldo=total-cobrado;
  return `<div class="l">Total<b>${money(total)}</b></div>
    <div class="l">Cobrado<b style="color:var(--ok)">${money(cobrado)}</b></div>
    <div class="l">Nuevo saldo<b style="color:${saldo<=0?'var(--ok)':'var(--rojo)'}">${money(Math.max(0,saldo))}${saldo<=0?' ✓':''}</b></div>`;
}
function cobroRenderTot(nro){
  const el=$("#cobTotales"); if(!el) return;
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return;
  el.innerHTML=cobroTotHTML(granTotal(v), cobroSum());
}
function cobroLiveTot(nro){
  const el=$("#cobTotales"); if(!el||cobroEditIdx===null) return;
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return;
  const total=granTotal(v);
  const sumOtros=cobroWork.reduce((a,x,j)=>a+(j===cobroEditIdx?0:Number(x.monto||0)),0);
  let nm=Math.max(0,+($("#cobEditMonto")?.value||0)); nm=Math.min(nm, Math.max(0,total-sumOtros));
  el.innerHTML=cobroTotHTML(total, sumOtros+nm);
}

function cobroAddPago(nro){
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return;
  const restante=granTotal(v)-cobroSum();
  let monto=Math.max(0, +($("#cobMonto")?.value||0));
  monto=Math.min(monto, Math.max(0,restante));
  if(monto<=0){ toast("⚠️ Ingresá un monto mayor a 0"); return; }
  const metodo=$("#cobMetodo")?.value||'Efectivo';
  cobroWork.push({monto, metodo, fecha:hoyISO(), usuario:nombreUsuario()});
  renderCobros(nro);
}
function cobroDelPago(nro, idx){ cobroWork.splice(idx,1); cobroEditIdx=null; renderCobros(nro); }
function cobroEditPago(nro, idx){ cobroEditIdx=idx; renderCobros(nro); }
function cobroCancelEdit(nro){ cobroEditIdx=null; renderCobros(nro); }
function cobroSavePago(nro, idx){
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return;
  const total=granTotal(v);
  const sumOtros=cobroWork.reduce((a,x,j)=>a+(j===idx?0:Number(x.monto||0)),0);
  let nm=Math.max(0,+($("#cobEditMonto")?.value||0)); nm=Math.min(nm, Math.max(0,total-sumOtros));
  if(nm<=0){ toast("⚠️ El monto debe ser mayor a 0 (o usá 🗑️ para quitarlo)"); return; }
  cobroWork[idx].monto=nm; cobroWork[idx].metodo=$("#cobEditMetodo")?.value||cobroWork[idx].metodo;
  cobroEditIdx=null; renderCobros(nro);
}

function confirmarCobros(nro){
  if(!(esMaestro()||esAdmin())){ toast("No tenés permiso"); return; }
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return;
  if(cobroEditIdx!==null){ toast("⚠️ Terminá de editar el cobro (Guardar o Cancelar) antes de confirmar"); return; }
  const total=granTotal(v);
  const cobrado=cobroSum();
  const saldoPrev=Number(v.saldo||0);
  v.pagos=cobroWork.map(p=>({monto:Number(p.monto||0), metodo:p.metodo, fecha:p.fecha||hoyISO(), usuario:p.usuario||nombreUsuario()}));
  v.saldo=Math.max(0, total-cobrado);
  const detalle=cobroWork.length?cobroWork.map(p=>`${money(p.monto)} (${p.metodo})`).join(', '):'sin cobros';
  auditar("Cobros actualizados","venta",nro,`saldo ${money(saldoPrev)} → ${money(v.saldo)} · ${detalle}`);
  cerrarModal(); renderTablaVentas();
  toast(`✅ Cobros guardados · saldo ${money(v.saldo)}`);
}

/* ====== EDITAR VENTA (productos, nota, pagos, IVA) ====== */
let editDraft = null;
function abrirEditarVenta(nro){
  if(!puede('editar_venta')){ toast("No tenés permiso para editar ventas"); return; }
  const v=VENTAS.find(x=>x.nro===nro); if(!v){ toast("Venta no encontrada"); return; }

  editDraft={
    nro,
    items:(v.items||[]).map(i=>({id:i.id, nombre:i.nombre, precio:+i.precio, cant:+i.cant, categoria:i.categoria})),
    itemsOrig:(v.items||[]).map(i=>({nombre:i.nombre, cant:+i.cant})),
    nota:v.nota||"", factura:!!v.factura,
    cobradoPrevio: granTotal(v)-(+v.saldo||0),
    pagosPrevios:(v.pagos||[]).slice(),
    nuevosPagos:[], editPagoIdx:null
  };
  const activos=PRODUCTOS.filter(p=>p.activo!==false);
  $("#modalRoot").innerHTML=`
   <div class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
    <div class="modal" style="max-width:700px">
     <header><h3>Editar venta #${nro} — ${v.cliente}</h3><button class="x" onclick="cerrarModal()">✕</button></header>
     <div class="body">
       <div class="field" style="max-width:260px"><label>¿Necesita factura? (IVA 21%)</label>
         <select id="edFactura" onchange="editDraft.factura=this.value==='si';editRenderItems()">
           <option value="no" ${!editDraft.factura?'selected':''}>No</option>
           <option value="si" ${editDraft.factura?'selected':''}>Sí — sumar IVA</option>
         </select>
       </div>
       <h4 style="margin:16px 0 6px;color:#374151">Productos</h4>
       <div class="row" style="align-items:end">
         <div class="field" style="flex:3"><label>Agregar producto</label>
           <select id="edProd"><option value="">Elegí un producto…</option>${activos.map(p=>`<option value="${p.id}">${(p.nombre+(p.desc?' · '+p.desc:'')).replace(/"/g,'&quot;')} — ${money(p.precio)}</option>`).join("")}</select>
         </div>
         <div class="field" style="flex:0 0 80px"><label>Cant.</label><input type="number" id="edCant" value="1" min="1"></div>
         <button class="btn btn-green" onclick="editAddItem()">＋ Agregar</button>
       </div>
       <div class="table-wrap"><table style="margin-top:10px"><thead id="edItemsHead"></thead><tbody id="edItems"></tbody></table></div>

       <h4 style="margin:16px 0 6px;color:#374151">Pagos</h4>
       <div id="edPagos"></div>
       <div class="row" style="align-items:end;margin-top:8px">
         <div class="field" style="flex:0 0 150px"><label>Agregar pago</label><div class="money-input"><span>$</span><input type="number" id="edPagoMonto" class="no-spin" placeholder="0" min="0"></div></div>
         <div class="field" style="flex:2"><label>Método</label><select id="edPagoMetodo"><option>Efectivo</option><option>Transferencia</option><option>Tarjeta</option><option>Cuenta corriente</option></select></div>
         <button class="btn btn-ghost" onclick="editAddPago()">＋ Pago</button>
       </div>

       <h4 style="margin:16px 0 6px;color:#374151">Nota / observación</h4>
       <textarea id="edNota" placeholder="Observaciones de la venta…">${(editDraft.nota||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>

       <div class="suma" style="box-shadow:none;border:1px solid var(--linea);margin-top:16px" id="edTotales"></div>
     </div>
     <div class="foot">
       <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
       <button class="btn btn-green" onclick="guardarEdicionVenta(${nro})">💾 Guardar cambios</button>
     </div>
    </div>
   </div>`;
  editRenderItems(); editRenderPagos();
}
function editTotales(){
  const total=editDraft.items.reduce((a,i)=>a+i.precio*i.cant,0);
  const iva=editDraft.factura?total*IVA_PCT:0, gran=total+iva;
  const cobrado=editDraft.cobradoPrevio+editDraft.nuevosPagos.reduce((a,p)=>a+(+p.monto||0),0);
  return {total,iva,gran,cobrado,saldo:gran-cobrado};
}
function editRenderItems(){
  const head=$("#edItemsHead"), tb=$("#edItems"); if(!tb) return;
  head.innerHTML = editDraft.factura
    ? `<tr><th>Cant.</th><th>Producto</th><th>Precio</th><th>IVA</th><th>Subtotal</th><th></th></tr>`
    : `<tr><th>Cant.</th><th>Producto</th><th>Precio</th><th>Subtotal</th><th></th></tr>`;
  const cs=editDraft.factura?6:5;
  if(!editDraft.items.length){ tb.innerHTML=`<tr><td colspan="${cs}" class="empty">Sin productos. Agregá al menos uno.</td></tr>`; editRenderTotales(); return; }
  tb.innerHTML=editDraft.items.map((i,idx)=>{
    const base=i.precio*i.cant, iva=editDraft.factura?base*IVA_PCT:0;
    const ci=`<input type="number" min="1" value="${i.cant}" style="width:64px;padding:5px" onchange="editSetCant(${idx},this.value)">`;
    return editDraft.factura
      ? `<tr><td>${ci}</td><td>${i.nombre}</td><td>${money(i.precio)}</td><td>${money(iva)}</td><td>${money(base+iva)}</td><td><button class="btn btn-ghost btn-sm" onclick="editDelItem(${idx})">🗑️</button></td></tr>`
      : `<tr><td>${ci}</td><td>${i.nombre}</td><td>${money(i.precio)}</td><td>${money(base)}</td><td><button class="btn btn-ghost btn-sm" onclick="editDelItem(${idx})">🗑️</button></td></tr>`;
  }).join("");
  editRenderTotales();
}
function editSetCant(idx,val){ editDraft.items[idx].cant=Math.max(1,+val||1); editRenderItems(); }
function editDelItem(idx){ editDraft.items.splice(idx,1); editRenderItems(); }
function editAddItem(){
  const id=+$("#edProd").value; if(!id){ toast("Elegí un producto de la lista"); return; }
  const p=PRODUCTOS.find(x=>x.id===id); if(!p) return;
  const cant=Math.max(1,+$("#edCant").value||1);
  const nombre=p.nombre+(p.desc?" · "+p.desc:"");
  const ex=editDraft.items.find(i=>i.nombre===nombre);
  if(ex) ex.cant+=cant; else editDraft.items.push({id:p.id,nombre,precio:p.precio,cant,categoria:p.cat});
  $("#edProd").value=""; $("#edCant").value=1; editRenderItems();
}
function editAddPago(){
  const monto=+$("#edPagoMonto").value||0; if(monto<=0){ toast("Ingresá un monto de pago válido"); return; }
  editDraft.nuevosPagos.push({monto,metodo:$("#edPagoMetodo").value,fecha:hoyISO(),usuario:nombreUsuario()});
  $("#edPagoMonto").value=""; editRenderPagos(); editRenderTotales();
}
function editDelNuevoPago(idx){ editDraft.nuevosPagos.splice(idx,1); editDraft.editPagoIdx=null; editRenderPagos(); editRenderTotales(); }
function editEditNuevoPago(idx){ editDraft.editPagoIdx=idx; editRenderPagos(); }
function editCancelNuevoPago(){ editDraft.editPagoIdx=null; editRenderPagos(); }
function editSaveNuevoPago(idx){
  const m=+($("#edPagoEditMonto")?.value)||0;
  if(m<=0){ toast("⚠️ Ingresá un monto mayor a 0 (o usá 🗑️ para quitarlo)"); return; }
  editDraft.nuevosPagos[idx].monto=m;
  editDraft.nuevosPagos[idx].metodo=$("#edPagoEditMetodo").value;
  editDraft.editPagoIdx=null;
  editRenderPagos(); editRenderTotales();
}
function editRenderPagos(){
  const c=$("#edPagos"); if(!c) return;
  const prev=editDraft.pagosPrevios.length
    ? editDraft.pagosPrevios.map(p=>`<div class="l" style="padding:5px 0"><span>${fmtFechaCorta(p.fecha)} · ${p.metodo||'Pago'}</span><b>${money(p.monto)}</b></div>`).join("")
    : `<div class="l" style="padding:5px 0"><span>Cobrado inicial</span><b>${money(editDraft.cobradoPrevio)}</b></div>`;
  const METP=['Efectivo','Transferencia','Tarjeta','Cuenta corriente'];
  const nuevos=editDraft.nuevosPagos.map((p,idx)=>{
    if(editDraft.editPagoIdx===idx){

function editRenderTotales(){
  const c=$("#edTotales"); if(!c) return; const t=editTotales();
  c.innerHTML=`${editDraft.factura?`<div class="l">Subtotal<b>${money(t.total)}</b></div><div class="l">IVA (21%)<b>${money(t.iva)}</b></div>`:''}

    <div class="l">Cobrado<b class="green">${money(t.cobrado)}</b></div>
    <div class="l">Saldo<b class="${t.saldo>0?'red':'green'}">${money(t.saldo)}</b></div>`;
}
function editAplicarStockDelta(){
  const orig={}; editDraft.itemsOrig.forEach(i=>orig[i.nombre]=(orig[i.nombre]||0)+i.cant);
  const now={}; editDraft.items.forEach(i=>now[i.nombre]=(now[i.nombre]||0)+i.cant);
  new Set([...Object.keys(orig),...Object.keys(now)]).forEach(nom=>{
    const delta=(now[nom]||0)-(orig[nom]||0); if(!delta) return;
    const p=PRODUCTOS.find(x=>(x.nombre+(x.desc?" · "+x.desc:""))===nom)||PRODUCTOS.find(x=>x.nombre===nom);
    if(p && p.descStock && !isNaN(+p.stock)){ p.stock=String(Math.max(0,(+p.stock)-delta)); if(window.persistirStock) window.persistirStock(p); }
  });
}
function guardarEdicionVenta(nro){
  const v=VENTAS.find(x=>x.nro===nro); if(!v) return false;
  if(!editDraft.items.length){ toast("⚠️ La venta tiene que tener al menos un producto"); return false; }
  const t=editTotales(); const nota=($("#edNota")?.value||"").trim();
  editAplicarStockDelta();
  const cambios=[];
  if(JSON.stringify(editDraft.itemsOrig)!==JSON.stringify(editDraft.items.map(i=>({nombre:i.nombre,cant:i.cant})))) cambios.push("productos");
  if((v.nota||"")!==nota) cambios.push("nota");
  if(!!v.factura!==editDraft.factura) cambios.push(editDraft.factura?"IVA agregado":"IVA quitado");
  if(editDraft.nuevosPagos.length) cambios.push(`${editDraft.nuevosPagos.length} pago(s) nuevo(s)`);
  const pagosBase=(v.pagos&&v.pagos.length)?v.pagos.slice():(editDraft.cobradoPrevio>0?[{monto:editDraft.cobradoPrevio,metodo:'Inicial',fecha:v.fecha,usuario:v.vendedor}]:[]);
  v.items=editDraft.items.map(i=>({id:i.id,nombre:i.nombre,precio:i.precio,cant:i.cant,categoria:i.categoria}));
  v.nota=nota; v.factura=editDraft.factura; v.total=t.total; v.iva=t.iva; v.saldo=t.saldo;
  v.pagos=pagosBase.concat(editDraft.nuevosPagos);
  auditar("Venta modificada","venta",nro,cambios.length?cambios.join(", "):"sin cambios relevantes");
  cerrarModal(); renderTablaVentas(); toast(`✅ Venta #${nro} actualizada`);
  return true;
}

/* ====== PRODUCTOS ====== */
function prodFiltrados(){
  const q=(prodQuery||'').trim().toLowerCase();
  let rows=PRODUCTOS.filter(p=>{
    if(prodCatFiltro && p.cat!==prodCatFiltro) return false;
    if(prodEstado==='activo' && p.activo===false) return false;
    if(prodEstado==='inactivo' && p.activo!==false) return false;
    if(q && !(((p.nombre||'')+' '+(p.desc||'')+' '+(p.cat||'')).toLowerCase().includes(q))) return false;
    return true;
  });
  // activos primero, inactivos al final; dentro, por nombre
  return rows.sort((a,b)=>{ const ai=a.activo===false?1:0, bi=b.activo===false?1:0; if(ai!==bi) return ai-bi; return (""+a.nombre).localeCompare(""+b.nombre,'es'); });
}

function guardarProducto(id){
  const nombre=$("#pNombre").value.trim(), cat=$("#pCat").value, precioRaw=$("#pPrecio").value, desc=$("#pDesc").value.trim(), stockRaw=$("#pStock").value.trim();
  const costoRaw=$("#pCosto").value, descStock=$("#pDescStock").value==='si';
  let falta=false;
  [["pNombre",!nombre],["pCat",!cat],["pPrecio",precioRaw===""||isNaN(+precioRaw)]].forEach(([id2,bad])=>{$("#"+id2).classList.toggle("err",bad); if(bad) falta=true;});
  if(falta){ toast("⚠️ Completá nombre, categoría y un precio válido"); return; }
  const precio=+precioRaw;
  const costo = (costoRaw===""||isNaN(+costoRaw)) ? 0 : +costoRaw;
  const stock = stockRaw==="" ? "No Desc" : (isNaN(+stockRaw) ? stockRaw : String(+stockRaw));
  if(id!=null){ Object.assign(PRODUCTOS.find(x=>x.id===id),{nombre,desc,cat,precio,costo,stock,descStock}); auditar("Producto modificado","producto",id,nombre); }
  else { const nid=Math.max(0,...PRODUCTOS.map(p=>p.id))+1; PRODUCTOS.push({id:nid,nombre,desc,cat,precio,costo,stock,descStock,activo:true}); auditar("Producto creado","producto",nid,nombre); }
  cerrarModal(); viewProductos(); toast("✅ Producto guardado");
}
function toggleProducto(id){
  if(!puede('gestionar_productos')){ toast("No tenés permiso"); return; }
  const p=PRODUCTOS.find(x=>x.id===id); if(!p) return;
  p.activo = p.activo===false;
  auditar(p.activo?"Producto activado":"Producto inactivado","producto",id,p.nombre);
  viewProductos(); toast(p.activo?`✅ "${p.nombre}" activado`:`⏸️ "${p.nombre}" inactivado (no se vende)`);
}

/* Datos históricos de ejemplo (2024, 2025, 2026 YTD) con semilla fija */
const VEND_REP=["Carolina Fabro","Facu Garro","Alex Antúnez","Mariano Gómez","Dani Díaz"];
const PROV_REP=["Buenos Aires","Córdoba","Santa Fe","Salta","Mendoza","San Luis","Tucumán","Neuquén"];
const CAT_PROD={
  Minipiscinas:[["Minipiscina 270 Blanco",4200000],["Minipiscina 270 Gris",4200000],["Línea 330 Arena",6500000],["Línea 370 Blanco",7800000]],
  Accesorios:[["Luz led RGB",165000],["3 Jets",90000],["Previsión climatización",150000],["Flete",120000]],
  Bonificaciones:[["Bonificación contado",-200000]],
};
function rngRep(seed){ return function(){ seed=(seed*1664525+1013904223)>>>0; return seed/4294967296; }; }
function generarHistorial(){
  const r=rngRep(987654321), L=[];
  const growth={2024:1.0,2025:1.28,2026:1.5};
  const est=[1.35,1.25,0.95,0.75,0.6,0.5,0.5,0.65,0.95,1.15,1.3,1.45]; // ene..dic (verano alto)
  for(const y of [2024,2025,2026]){
    const maxMes=(y===2026)? new Date().getMonth() : 11;
    for(let m=0;m<=maxMes;m++){
      const nP=Math.max(1,Math.round(6*est[m]*growth[y]*(0.8+0.5*r())));
      for(let i=0;i<nP;i++){
        const fecha=`${y}-${String(m+1).padStart(2,'0')}-${String(1+Math.floor(r()*27)).padStart(2,'0')}`;
        const vend=VEND_REP[Math.floor(r()*VEND_REP.length)], prov=PROV_REP[Math.floor(r()*PROV_REP.length)];
        const mp=CAT_PROD.Minipiscinas[Math.floor(r()*CAT_PROD.Minipiscinas.length)];
        L.push({fecha,vendedor:vend,provincia:prov,categoria:"Minipiscinas",producto:mp[0],unidades:1,monto:mp[1]});
        const nA=Math.floor(r()*3);
        for(let a=0;a<nA;a++){ const ac=CAT_PROD.Accesorios[Math.floor(r()*CAT_PROD.Accesorios.length)], u=1+Math.floor(r()*2); L.push({fecha,vendedor:vend,provincia:prov,categoria:"Accesorios",producto:ac[0],unidades:u,monto:ac[1]*u}); }
        if(r()<0.22){ const bo=CAT_PROD.Bonificaciones[0]; L.push({fecha,vendedor:vend,provincia:prov,categoria:"Bonificaciones",producto:bo[0],unidades:0,monto:bo[1]}); }
      }
    }
  }
  return L;
}
function historialDesdeVentas(vts){
  const L=[];
  vts.forEach(v=>{ if(v.cancelada) return; (v.items||[]).forEach(i=>{
    L.push({fecha:v.fecha,vendedor:v.vendedor,provincia:v.provincia||"Otras / s.d.",estado:v.estado||"",categoria:i.categoria||"Accesorios",producto:i.nombre,unidades:i.cant,monto:i.precio*i.cant});
  }); });
  return L;
}

  const porProd={}; lineas.forEach(l=>{const o=porProd[l.producto]=porProd[l.producto]||{u:0,m:0,cat:l.categoria};o.u+=l.unidades;o.m+=l.monto;});
  const porVend={}; lineas.forEach(l=>{const o=porVend[l.vendedor]=porVend[l.vendedor]||{u:0,m:0};o.u+=l.unidades;o.m+=l.monto;});
  const porCat={};  lineas.forEach(l=>{const o=porCat[l.categoria]=porCat[l.categoria]||{u:0,m:0};o.u+=l.unidades;o.m+=l.monto;});
  const val=o=>esU?o.u:o.m;
  const rankP=Object.entries(porProd).map(([k,o])=>({k,...o})).sort((a,b)=>val(b)-val(a));
  const rankV=Object.entries(porVend).map(([k,o])=>({k,...o})).sort((a,b)=>val(b)-val(a));
  const rankC=Object.entries(porCat).map(([k,o])=>({k,...o})).sort((a,b)=>val(b)-val(a));
  const maxP=Math.max(1,...rankP.map(r=>Math.abs(val(r)))), maxV=Math.max(1,...rankV.map(r=>Math.abs(val(r))));
  const fmt=v=>esU?`${v.toLocaleString("es-AR")} u`:money(v);
  return `
    <div class="card">
      <div class="row" style="align-items:end">
        <div class="field" style="flex:0 0 140px"><label>Desde</label><input type="date" value="${repDesde}" onchange="repDesde=this.value;renderRepBody()"></div>
        <div class="field" style="flex:0 0 140px"><label>Hasta</label><input type="date" value="${repHasta}" onchange="repHasta=this.value;renderRepBody()"></div>
        <div class="field"><label>Provincia</label><select onchange="repProv=this.value;renderRepBody()"><option value="">Todas</option>${provinciasRep().map(p=>`<option ${repProv===p?'selected':''}>${p}</option>`).join("")}</select></div>
        <div class="field"><label>Categoría</label><select onchange="repCat=this.value;renderRepBody()"><option value="">Todas</option>${CATEGORIAS.map(c=>`<option ${repCat===c?'selected':''}>${c}</option>`).join("")}</select></div>
        <div class="field"><label>Vendedor</label><select onchange="repVend=this.value;renderRepBody()"><option value="">Todos</option>${vendedoresRep().map(v=>`<option ${repVend===v?'selected':''}>${v}</option>`).join("")}</select></div>
        <div class="field"><label>Estado</label><select onchange="repEstado=this.value;renderRepBody()"><option value="">Todos</option>${ESTADOS.map(e=>`<option ${repEstado===e.nombre?'selected':''}>${e.nombre}</option>`).join("")}</select></div>
        <div class="field"><label>Medir por</label><select onchange="repMetrica=this.value;renderRepBody()"><option value="unidades" ${esU?'selected':''}>Unidades</option><option value="monto" ${!esU?'selected':''}>Facturación</option></select></div>
      </div>
      <div class="legend" style="margin-top:10px">Podés combinar todos los filtros: provincia + fecha, provincia + vendedor, fecha + estado, provincia + estado + vendedor, etc.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="chip" onclick="repDesde='${new Date().getFullYear()}-01-01';repHasta=hoyISO();renderRepBody()">Este año</button>
        <button class="chip" onclick="repDesde='2025-01-01';repHasta='2025-12-31';renderRepBody()">2025</button>
        <button class="chip" onclick="repDesde='2024-01-01';repHasta='2024-12-31';renderRepBody()">2024</button>
        <button class="chip" onclick="repDesde=isoMenosDias(365);repHasta=hoyISO();renderRepBody()">Últimos 12 meses</button>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="t">Unidades vendidas</div><div class="n">${totU.toLocaleString("es-AR")}</div></div>
      <div class="kpi"><div class="t">Facturación</div><div class="n green">${money(totM)}</div></div>
      <div class="kpi"><div class="t">Productos distintos</div><div class="n">${rankP.filter(r=>r.u>0).length}</div></div>
      <div class="kpi"><div class="t">Vendedor top</div><div class="n" style="font-size:17px">${rankV[0]?rankV[0].k:'—'}</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <h3 style="margin-bottom:12px">Ranking de productos · ${esU?'unidades':'facturación'}</h3>
        <table><tbody>${rankP.slice(0,12).map(r=>`<tr><td style="width:40%"><b>${r.k}</b><br><small class="legend">${r.cat}</small></td><td><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="width:${Math.abs(val(r))/maxP*100}%;min-width:2px"></div><span>${fmt(val(r))}</span></div></td></tr>`).join("")||`<tr><td class="empty">Sin datos en el período</td></tr>`}</tbody></table>
      </div>
      <div>
        <div class="card">
          <h3 style="margin-bottom:12px">Por vendedor</h3>
          <table><tbody>${rankV.map(r=>`<tr><td style="width:42%"><b>${r.k}</b></td><td><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="width:${Math.abs(val(r))/maxV*100}%;min-width:2px;background:var(--azul)"></div><span>${fmt(val(r))}</span></div></td></tr>`).join("")}</tbody></table>
        </div>
        <div class="card">
          <h3 style="margin-bottom:12px">Por categoría</h3>
          <table><thead><tr><th>Categoría</th><th>Unidades</th><th>Facturación</th></tr></thead><tbody>${rankC.map(r=>`<tr><td><b>${r.k}</b></td><td>${r.u.toLocaleString("es-AR")}</td><td>${money(r.m)}</td></tr>`).join("")}</tbody></table>
        </div>
      </div>
    </div>`;
}

/* --- 2) Comparativa mensual por año --- */
function htmlRepComparativa(){
  const esU=repMetrica==="unidades";
  const years=[2024,2025,2026];
  const tot=years.map(y=>mesesTotales(y,repMetrica,repCat));
  const totAnual=tot.map(a=>a.reduce((x,y)=>x+y,0));
  const fmt=v=>esU?v.toLocaleString("es-AR"):money(v);
  const mesAct=new Date().getMonth();
  const difTot= totAnual[1]? Math.round((totAnual[2]-totAnual[1])/totAnual[1]*100) : 0;
  return `
    <div class="card">
      <div class="row" style="align-items:end">
        <div class="field"><label>Categoría</label><select onchange="repCat=this.value;renderRepBody()"><option value="">Todas</option>${CATEGORIAS.map(c=>`<option ${repCat===c?'selected':''}>${c}</option>`).join("")}</select></div>
        <div class="field"><label>Medir por</label><select onchange="repMetrica=this.value;renderRepBody()"><option value="unidades" ${esU?'selected':''}>Unidades</option><option value="monto" ${!esU?'selected':''}>Facturación</option></select></div>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px">Comparativa por mes y año ${repCat?'· '+repCat:''}</h3>
      <canvas id="cvComp" height="110"></canvas>
    </div>
    <div class="card">
      <h3 style="margin-bottom:10px">Detalle mensual</h3>
      <table>
        <thead><tr><th>Mes</th>${years.map(y=>`<th>${y}</th>`).join("")}<th>Dif. 25→26</th></tr></thead>
        <tbody>${MESES.map((mn,i)=>{const v24=tot[0][i],v25=tot[1][i],v26=tot[2][i];const fut=i>mesAct;const dif=v25?Math.round((v26-v25)/v25*100):(v26>0?100:0);return `<tr><td><b>${mn}</b></td><td>${fmt(v24)}</td><td>${fmt(v25)}</td><td>${fut?'<span class="legend">—</span>':fmt(v26)}</td><td>${fut?'—':`<b style="color:${dif>=0?'var(--ok)':'var(--rojo)'}">${dif>=0?'+':''}${dif}%</b>`}</td></tr>`;}).join("")}
        <tr style="border-top:2px solid var(--linea)"><td><b>Total año</b></td>${totAnual.map(t=>`<td><b>${fmt(t)}</b></td>`).join("")}<td><b style="color:${difTot>=0?'var(--ok)':'var(--rojo)'}">${difTot>=0?'+':''}${difTot}%</b></td></tr>
        </tbody>
      </table>
      <div class="legend" style="margin-top:8px">2026 va hasta ${fmtFechaCorta(hoyISO())} (año en curso).</div>
    </div>`;
}
function dibujarComparativa(){
  const cv=document.getElementById("cvComp"); if(!cv||!window.Chart) return;
  if(chartComp){ chartComp.destroy(); chartComp=null; }
  const esU=repMetrica==="unidades", years=[2024,2025,2026], cols=["#cbd5e1","#2c7be5","#3f6f5e"];
  chartComp=new Chart(cv,{type:"bar",
    data:{labels:MESES,datasets:years.map((y,i)=>({label:String(y),data:mesesTotales(y,repMetrica,repCat),backgroundColor:cols[i],borderRadius:4}))},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:"top"},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${esU?c.parsed.y.toLocaleString("es-AR")+' u':money(c.parsed.y)}`}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>esU?v:money(v)}}}}});
}

/* --- 3) Termómetro + provincias --- */
function htmlRepTermometro(){
  const esU=repMetrica==="unidades", mes=repMes;
  const actual=totalMes(2026,mes,repMetrica,repCat), previo=totalMes(2025,mes,repMetrica,repCat);
  const dif= previo? Math.round((actual-previo)/previo*100) : (actual>0?100:0);
  const max=Math.max(actual,previo,1)*1.2;
  const fillA=Math.min(100,actual/max*100), markP=Math.min(100,previo/max*100);
  const color= dif>=0?'var(--ok)':'var(--rojo)';
  const fmt=v=>esU?`${v.toLocaleString("es-AR")} u`:money(v);
  const provA={}, provP={};
  HISTORIAL.forEach(l=>{ if(repCat&&l.categoria!==repCat)return; const yr=l.fecha.slice(0,4); const v=esU?l.unidades:l.monto;
    if(yr==="2026"){ provA[l.provincia]=(provA[l.provincia]||0)+v; } else if(yr==="2025"){ provP[l.provincia]=(provP[l.provincia]||0)+v; } });
  const rankProv=Object.entries(provA).map(([p,v])=>({p,v,ant:provP[p]||0})).sort((a,b)=>b.v-a.v);
  const maxProv=Math.max(1,...rankProv.map(r=>Math.abs(r.v)));
  return `
    <div class="card">
      <div class="row" style="align-items:end">
        <div class="field"><label>Mes a comparar (2026 vs 2025)</label><select onchange="repMes=+this.value;renderRepBody()">${MESES_L.map((mn,i)=>`<option value="${i}" ${i===mes?'selected':''}>${mn}</option>`).join("")}</select></div>
        <div class="field"><label>Medir por</label><select onchange="repMetrica=this.value;renderRepBody()"><option value="unidades" ${esU?'selected':''}>Unidades</option><option value="monto" ${!esU?'selected':''}>Facturación</option></select></div>
        <div class="field"><label>Categoría</label><select onchange="repCat=this.value;renderRepBody()"><option value="">Todas</option>${CATEGORIAS.map(c=>`<option ${repCat===c?'selected':''}>${c}</option>`).join("")}</select></div>
      </div>
    </div>
    <div class="grid2">
      <div class="card">
        <h3 style="margin-bottom:6px">${MESES_L[mes]}: 2026 vs 2025</h3>
        <div style="display:flex;justify-content:center;gap:28px;align-items:flex-end;margin:18px 0 10px">
          <div class="termo"><div class="termo-fill" style="height:${fillA}%"></div><div class="termo-mark" style="bottom:${markP}%"></div></div>
          <div style="text-align:left">
            <div style="font-size:42px;font-weight:800;color:${color};line-height:1">${dif>=0?'+':''}${dif}%</div>
            <div class="legend" style="margin-bottom:10px">respecto a ${MESES_L[mes]} 2025</div>
            <div><b>2026:</b> ${fmt(actual)}</div>
            <div><b>2025:</b> ${fmt(previo)}</div>
            <div style="margin-top:8px;color:${color};font-weight:700">${dif>=0?'▲ Vas por encima':'▼ Vas por debajo'}</div>
          </div>
        </div>
        <div class="legend" style="text-align:center">La línea punteada roja marca el nivel del año pasado.</div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:12px">Ventas por provincia · 2026 ${repCat?'· '+repCat:''}</h3>
        <table><tbody>${rankProv.map(r=>{const d=r.ant?Math.round((r.v-r.ant)/r.ant*100):(r.v>0?100:0);return `<tr><td style="width:32%"><b>${r.p}</b></td><td><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="width:${Math.abs(r.v)/maxProv*100}%;min-width:2px"></div><span>${esU?r.v.toLocaleString("es-AR")+' u':money(r.v)}</span></div></td><td style="text-align:right;white-space:nowrap"><b style="color:${d>=0?'var(--ok)':'var(--rojo)'}">${d>=0?'+':''}${d}%</b> <small class="legend">vs 25</small></td></tr>`;}).join("")}</tbody></table>
      </div>
    </div>`;
}
